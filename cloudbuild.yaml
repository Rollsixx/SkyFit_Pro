# ────────────────────────────────────────────────────────────────────────────
# SkyFit Pro — GCP Cloud Build CI/CD
#
# Substitution variables (set in Cloud Build trigger or manually):
#   _REGION                  — e.g. asia-east1
#   _SERVICE_NAME            — e.g. skyfit-pro
#   _OPENWEATHER_API_KEY     — store in Secret Manager, referenced below
#   _FIREBASE_API_KEY        — store in Secret Manager
#   _FIREBASE_PROJECT_ID     — your Firebase/GCP project ID
#   _FIREBASE_MESSAGING_SENDER_ID
#   _FIREBASE_APP_ID
# ────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: asia-east1
  _SERVICE_NAME: skyfit-pro
  _FIREBASE_PROJECT_ID: $PROJECT_ID   # auto-filled by Cloud Build

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/OPENWEATHER_API_KEY/versions/latest
      env: OPENWEATHER_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/EMAILJS_SERVICE_ID/versions/latest
      env: EMAILJS_SERVICE_ID
    - versionName: projects/$PROJECT_ID/secrets/EMAILJS_TEMPLATE_ID/versions/latest
      env: EMAILJS_TEMPLATE_ID
    - versionName: projects/$PROJECT_ID/secrets/EMAILJS_PUBLIC_KEY/versions/latest
      env: EMAILJS_PUBLIC_KEY
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_API_KEY/versions/latest
      env: FIREBASE_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: FIREBASE_MESSAGING_SENDER_ID
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_APP_ID/versions/latest
      env: FIREBASE_APP_ID

steps:
  # ── Step 1: Build the Docker image ──────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    secretEnv:
      - OPENWEATHER_API_KEY
      - EMAILJS_SERVICE_ID
      - EMAILJS_TEMPLATE_ID
      - EMAILJS_PUBLIC_KEY
      - FIREBASE_API_KEY
      - FIREBASE_MESSAGING_SENDER_ID
      - FIREBASE_APP_ID
    args:
      - 'build'
      - '--tag=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--tag=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '--build-arg=OPENWEATHER_API_KEY=$$OPENWEATHER_API_KEY'
      - '--build-arg=EMAILJS_SERVICE_ID=$$EMAILJS_SERVICE_ID'
      - '--build-arg=EMAILJS_TEMPLATE_ID=$$EMAILJS_TEMPLATE_ID'
      - '--build-arg=EMAILJS_PUBLIC_KEY=$$EMAILJS_PUBLIC_KEY'
      - '--build-arg=FIREBASE_API_KEY=$$FIREBASE_API_KEY'
      - '--build-arg=FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}'
      - '--build-arg=FIREBASE_MESSAGING_SENDER_ID=$$FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg=FIREBASE_APP_ID=$$FIREBASE_APP_ID'
      - '.'

  # ── Step 2: Push the image to Container Registry ────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-latest'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'   # public web app
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'

# Store built images
images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

# Timeout for the entire build
timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'   # faster build for Flutter